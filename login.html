<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KHUSHI Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="wavy-login-body">

    <div class="ultra-glass-box">
        <div class="login-brand-minimal">
            <p style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; opacity: 0.8;">Welcome Back</p>
            <h2 style="margin-bottom: 20px;">Login</h2>
        </div>
        
        <form class="wavy-form">
            <div class="input-block">
                <label>Email Address</label>
                <input type="email" placeholder="example@gmail.com" required>
            </div>

            <div class="input-block" style="position: relative;">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Password" required style="width: 100%;">
                <i class="fa-solid fa-eye-slash" id="togglePassword" style="position: absolute; right: 15px; top: 38px; cursor: pointer; color: rgba(255,255,255,0.7);"></i>
            </div>

            <button type="submit" class="wavy-btn-signin">Sign In</button>
        </form>

        <div class="social-login-wavy">
            <p style="margin: 20px 0 10px; font-size: 0.8rem; opacity: 0.6;">Or login with</p>
            <div style="display: flex; justify-content: center; gap: 20px;">
                <a href="#" class="social-icon"><i class="fa-brands fa-google"></i></a>
                <a href="#" class="social-icon"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="social-icon"><i class="fa-brands fa-github"></i></a>
            </div>
        </div>
        
        <a href="index.html" class="back-link" style="display: block; margin-top: 25px; text-decoration: none; color: white; font-size: 0.9rem; opacity: 0.7;">
            <i class="fa-solid fa-arrow-left"></i> Back to Homepage
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
