<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavy Premium Login | KHUSHI Construction</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="wavy-login-body">
    <div class="wavy-login-wrapper">
        <div class="ultra-glass-box">
            
            <div class="login-brand-minimal">
                <p>Your logo</p>
                <h2>Login</h2>
            </div>
            
            <form class="wavy-form">
                <div class="input-block">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="username@gmail.com" required>
                </div>

                <div class="input-block">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fas fa-eye-slash" id="togglePassword"></i>
                </div>

                <div class="forgot-wrapper">
                    <a href="#" class="forgot-wavy">Forgot Password?</a>
                </div>

                <button type="submit" class="wavy-btn-signin">Sign In</button>

                <div class="divider-wavy">
                    <span>or continue with</span>
                </div>

                <div class="social-login-wavy">
                    <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
                    <a href="#" class="social-icon"><i class="fab fa-github"></i></a>
                    <a href="#" class="social-icon"><i class="fab fa-facebook"></i></a>
                </div>

                <div class="signup-footer-wavy">
                    <p>Don't have an account? <a href="#">Register for free</a></p>
                </div>
            </form>
            
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
