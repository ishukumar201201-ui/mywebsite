<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Login | KHUSHI Construction</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page-body">
    <div class="login-wrapper">
        <div class="glass-login-box">
            <div class="login-brand">
                <i class="fas fa-hard-hat"></i>
                <h2>KHUSHI <span>Construction</span></h2>
            </div>
            
            <form class="premium-form">
                <h3>Welcome Back</h3>
                <p>Please enter your details to login</p>

                <div class="input-field">
                    <input type="email" id="email" required>
                    <label for="email">Email Address</label>
                    <i class="fas fa-envelope"></i>
                </div>

                <div class="input-field">
                    <input type="password" id="password" required>
                    <label for="password">Password</label>
                    <i class="fas fa-eye" id="togglePassword" style="cursor: pointer;"></i>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="premium-login-btn">
                    Sign In <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <a href="index.html" class="go-back">
                <i class="fas fa-chevron-left"></i> Back to Homepage
            </a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
